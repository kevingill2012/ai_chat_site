services:
  ai-chat-site:
    build: .
    container_name: ai_chat_site
    restart: always
    ports:
      # 固定端口：49193（非默认端口）
      # 默认仅监听本机，建议通过 Cloudflare Tunnel / Nginx 对外提供服务
      - "127.0.0.1:49193:49193"
    environment:
      - TZ=Asia/Shanghai
      - PORT=49193
      - AI_CHAT_SITE_SECRET_KEY=${AI_CHAT_SITE_SECRET_KEY}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - GEMINI_MODEL=${GEMINI_MODEL:-gemini-2.5-flash}
      - GEMINI_ALLOWED_MODELS=${GEMINI_ALLOWED_MODELS:-gemini-2.5-flash,gemini-2.0-flash}
      - AI_CHAT_SITE_ALLOWED_HOSTS=${AI_CHAT_SITE_ALLOWED_HOSTS}
      - TRUST_PROXY_HEADERS=${TRUST_PROXY_HEADERS:-1}
      - FORCE_HTTPS=${FORCE_HTTPS:-1}
      - DATABASE_PATH=${DATABASE_PATH:-/data/ai_chat_site.sqlite3}
      - TURNSTILE_SITE_KEY=${TURNSTILE_SITE_KEY:-}
      - TURNSTILE_SECRET_KEY=${TURNSTILE_SECRET_KEY:-}
      - MEMORY_ENABLED_DEFAULT=${MEMORY_ENABLED_DEFAULT:-1}
      - MEMORY_EMBED_MODEL=${MEMORY_EMBED_MODEL:-text-embedding-004}
      - MEMORY_TOP_K=${MEMORY_TOP_K:-5}
      - MEMORY_MAX_ITEMS=${MEMORY_MAX_ITEMS:-2000}
      - LOCKOUT_MAX_FAILS=${LOCKOUT_MAX_FAILS:-8}
      - LOCKOUT_WINDOW_SECONDS=${LOCKOUT_WINDOW_SECONDS:-900}
      - LOCKOUT_SECONDS=${LOCKOUT_SECONDS:-1800}
    volumes:
      - ./data:/data:rw
