{% extends "base.html" %}
{% block title %}注册{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-12 col-md-7 col-lg-5">
    <div class="card shadow-sm">
      <div class="card-body p-4">
        <h5 class="mb-3">注册</h5>
        <form method="post" action="/auth/register">
          <input type="hidden" name="csrf_token" value="{{ csrf_token() }}" />
          <div class="mb-3">
            <label class="form-label small text-muted">用户名（3-32 位，字母/数字/下划线）</label>
            <input class="form-control" name="username" autocomplete="username" required />
          </div>
          <div class="mb-3">
            <label class="form-label small text-muted">邮箱</label>
            <input class="form-control" type="email" name="email" autocomplete="email" required />
          </div>
          <div class="mb-3">
            <label class="form-label small text-muted">邀请码</label>
            <input class="form-control" name="invite_code" autocomplete="off" required />
          </div>
          <div class="mb-3">
            <label class="form-label small text-muted">密码（至少 10 位）</label>
            <input class="form-control" type="password" name="password" autocomplete="new-password" required />
          </div>
          <div class="mb-3">
            <label class="form-label small text-muted">确认密码</label>
            <input class="form-control" type="password" name="password2" autocomplete="new-password" required />
          </div>
          {% if turnstile_site_key %}
          <div class="mb-3">
            <div class="cf-turnstile" data-sitekey="{{ turnstile_site_key }}"></div>
          </div>
          {% endif %}
          <button class="btn btn-success w-100" type="submit">Create Account</button>
        </form>
        <div class="mt-3 small">
          已有账号？<a href="/auth/login">登录</a>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}

{% block head %}
  {% if turnstile_site_key %}
    <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
  {% endif %}
{% endblock %}
