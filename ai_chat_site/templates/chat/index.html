{% extends "base.html" %}
{% block title %}聊天{% endblock %}

{% block head %}
  <script defer src="{{ url_for('static', filename='js/chat.js') }}"></script>
{% endblock %}

{% block content %}
<div
  id="chatApp"
  data-current-conversation-id="{{ current_conversation_id }}"
  data-default-model="{{ model_name }}"
  data-allowed-models='{{ allowed_models | tojson }}'
>
  <div class="row g-3 chat-shell">
    <div class="col-12 col-lg-3 h-100"><div class="card shadow-sm chat-sidebar h-100 d-flex flex-column"><div class="card-header bg-white d-flex align-items-center justify-content-between"><div class="fw-semibold">对话</div><button class="btn btn-sm btn-primary d-inline-flex align-items-center gap-1" id="btnNewConversation"><i class="fa-solid fa-plus"></i><span>新建</span></button></div><div class="list-group list-group-flush chat-conv-list flex-grow-1" id="conversationList">{% for c in conversations %}<button type="button" class="list-group-item list-group-item-action d-flex align-items-center justify-content-between {% if c.id == current_conversation_id %}active{% endif %}" data-conversation-id="{{ c.id }}"><span class="text-truncate me-2">{{ c.title }}</span><span class="d-flex gap-2 align-items-center"><i class="fa-solid fa-pen-to-square chat-conv-action" data-action="rename" title="重命名"></i><i class="fa-solid fa-trash chat-conv-action" data-action="delete" title="删除"></i></span></button>{% endfor %}</div><div class="card-footer bg-white"><div class="token-widget"><div class="token-widget-head"><i class="fa-solid fa-chart-simple me-2"></i><span>Token 统计</span></div><div class="token-grid"><div class="token-item"><div class="k">本对话</div><div class="v" id="tokChat">0</div></div><div class="token-item"><div class="k">本周</div><div class="v" id="tokWeek">0</div></div><div class="token-item"><div class="k">本月</div><div class="v" id="tokMonth">0</div></div><div class="token-item"><div class="k">累计</div><div class="v" id="tokTotal">0</div></div></div></div></div></div></div>
    <div class="col-12 col-lg-9 h-100">
      <div class="chat-main-topbar mb-2"><div class="d-flex align-items-center gap-2 flex-wrap"><span class="text-muted small">模型</span><select class="form-select form-select-sm" style="width: 220px" id="modelSelect"></select><div class="form-check form-switch m-0"><input class="form-check-input" type="checkbox" role="switch" id="memoryToggle" {% if memory_enabled_default %}checked{% endif %} /><label class="form-check-label small text-muted" for="memoryToggle">记忆</label></div></div><div class="d-flex align-items-center gap-2"><button class="btn btn-outline-danger btn-sm" id="btnClear"><i class="fa-solid fa-broom me-1"></i>清空</button></div></div>
      <div class="card shadow-sm chat-card"><div class="card-header bg-white border-bottom d-flex align-items-center justify-content-between"><h6 class="mb-0 text-primary"><i class="fa-solid fa-robot me-2"></i>AI ENGINE</h6><span class="text-muted small text-truncate" style="max-width: 55%" id="currentConversationTitle"></span></div><div class="card-body overflow-auto" style="background: linear-gradient(180deg, rgba(255,255,255,.55) 0%, rgba(248,250,252,.35) 100%);" id="chatBox"></div><div class="card-footer bg-white"><div class="d-flex gap-2 align-items-stretch flex-nowrap"><textarea class="form-control chat-input" id="userInput" placeholder="输入问题...（Enter 发送，Shift+Enter 换行）" autocomplete="off" rows="5"></textarea><button class="btn btn-primary d-inline-flex align-items-center gap-1 flex-shrink-0" id="btnSend"><i class="fa-solid fa-paper-plane"></i><span>发送</span></button></div><div class="text-muted small text-truncate mt-2" id="hint"></div></div></div>
    </div>
  </div>
</div>
{% endblock %}
